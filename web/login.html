<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ragnar - Login</title>
    <link rel="icon" href="/images/ragnar.ico" type="image/x-icon">
    <link rel="stylesheet" href="/css/tailwind.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(14, 165, 233, 0.3); }
            50% { box-shadow: 0 0 25px rgba(14, 165, 233, 0.6); }
        }
        .login-card {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        /* Floating status whispers */
        .whisper {
            position: fixed;
            font-size: 0.75rem;
            font-family: monospace;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
            white-space: nowrap;
        }
        .whisper.visible { opacity: 1; }
        .whisper.fading  { opacity: 0; }

        @keyframes drift {
            0%   { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }
        .whisper.visible {
            animation: drift 3s ease-in-out infinite alternate;
        }
    </style>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-4">

    <!-- Whisper container - floating text around the page -->
    <div id="whisper-layer"></div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo & Title -->
        <div class="text-center mb-8 relative">
            <img id="viking-img" src="/images/ragnar.png" alt="Ragnar" class="w-24 h-32 mx-auto mb-4 object-contain">
            <h1 class="text-3xl font-bold text-white">Ragnar</h1>
            <p class="text-gray-400 mt-1">Cyberviking Security Scanner</p>
        </div>

        <!-- Login Card -->
        <div id="login-card" class="glass rounded-xl p-6 login-card">
            <!-- Hardware Mismatch Warning (hidden by default) -->
            <div id="hw-mismatch-warning" class="hidden mb-4 p-3 rounded-lg bg-red-900/30 border border-red-700">
                <p class="text-sm text-red-300">
                    Hardware mismatch detected. This Ragnar instance is bound to different hardware.
                </p>
            </div>

            <!-- Status Message -->
            <div id="login-status" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username"
                           class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-gray-400 focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none"
                           placeholder="Enter username">
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                           class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-gray-400 focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none"
                           placeholder="Enter password">
                </div>
                <button type="submit" id="login-btn"
                        class="w-full bg-sky-600 hover:bg-sky-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors disabled:bg-gray-600 disabled:cursor-not-allowed">
                    Login
                </button>
            </form>

            <!-- Recovery Toggle -->
            <div class="mt-4 text-center">
                <button onclick="toggleRecovery()" class="text-sm text-gray-400 hover:text-sky-400 transition-colors">
                    Forgot password? Use recovery code
                </button>
            </div>
        </div>

        <!-- Recovery Card (hidden by default) -->
        <div id="recovery-card" class="glass rounded-xl p-6 hidden">
            <h2 class="text-xl font-bold mb-4">Password Recovery</h2>
            <p class="text-gray-400 text-sm mb-4">Enter your username, one of your recovery codes, and a new password.</p>

            <div id="recovery-status" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

            <form id="recovery-form" onsubmit="handleRecovery(event)">
                <div class="mb-4">
                    <label for="recovery-username" class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                    <input type="text" id="recovery-username" required autocomplete="username"
                           class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-gray-400 focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none"
                           placeholder="Enter username">
                </div>
                <div class="mb-4">
                    <label for="recovery-code" class="block text-sm font-medium text-gray-300 mb-2">Recovery Code</label>
                    <input type="text" id="recovery-code" required autocomplete="off"
                           class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-gray-400 focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none font-mono tracking-wider"
                           placeholder="XXXX-XXXX" maxlength="9"
                           oninput="formatRecoveryCode(this)">
                </div>
                <div class="mb-4">
                    <label for="recovery-new-password" class="block text-sm font-medium text-gray-300 mb-2">New Password</label>
                    <input type="password" id="recovery-new-password" required autocomplete="new-password" minlength="8"
                           class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-gray-400 focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none"
                           placeholder="Minimum 8 characters">
                </div>
                <div class="mb-6">
                    <label for="recovery-confirm-password" class="block text-sm font-medium text-gray-300 mb-2">Confirm New Password</label>
                    <input type="password" id="recovery-confirm-password" required autocomplete="new-password" minlength="8"
                           class="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-gray-400 focus:ring-2 focus:ring-sky-500 focus:border-transparent outline-none"
                           placeholder="Confirm new password">
                </div>
                <button type="submit" id="recovery-btn"
                        class="w-full bg-sky-600 hover:bg-sky-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors disabled:bg-gray-600 disabled:cursor-not-allowed">
                    Reset Password
                </button>
            </form>

            <div class="mt-4 text-center">
                <button onclick="toggleRecovery()" class="text-sm text-gray-400 hover:text-sky-400 transition-colors">
                    Back to login
                </button>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-500 text-xs mt-6">Ragnar Cyberviking &mdash; Hardware-bound authentication</p>
    </div>

    <script>
        // ====================================================================
        // Floating whisper messages during login
        // ====================================================================
        const whisperMessages = [
            { text: 'Verifying credentials...', color: '#38bdf8' },
            { text: 'Checking hardware binding...', color: '#818cf8' },
            { text: 'Decrypting the vault...', color: '#34d399' },
            { text: 'Unlocking rune stones...', color: '#f59e0b' },
            { text: 'Sharpening the axe...', color: '#fb7185' },
            { text: 'Reading the sagas...', color: '#a78bfa' },
            { text: 'Summoning the longship...', color: '#2dd4bf' },
            { text: 'Restoring the mead hall...', color: '#fbbf24' },
            { text: 'Forging Fernet keys...', color: '#38bdf8' },
            { text: 'Raising the shield wall...', color: '#f472b6' },
            { text: 'Navigating by the stars...', color: '#818cf8' },
            { text: 'Loading network maps...', color: '#34d399' },
            { text: 'Consulting the oracle...', color: '#fb923c' },
            { text: 'Binding to hardware...', color: '#38bdf8' },
            { text: 'Preparing the raid...', color: '#f87171' },
            { text: 'Waking the Valkyries...', color: '#c084fc' },
            { text: 'Decoding ancient protocols...', color: '#2dd4bf' },
            { text: 'Initializing Ragnar...', color: '#4ade80' },
            { text: 'Hashing with PBKDF2...', color: '#38bdf8' },
            { text: 'Invoking Odin\'s wisdom...', color: '#fbbf24' },
            { text: 'Spinning up the war drums...', color: '#f87171' },
            { text: 'Carving the rune key...', color: '#a78bfa' },
            { text: 'Hoisting the sails...', color: '#2dd4bf' },
            { text: 'Scanning the horizon...', color: '#818cf8' },
            { text: 'Polishing Mjolnir...', color: '#fb923c' },
            { text: 'Crossing the Bifrost...', color: '#c084fc' },
            { text: 'Feeding the ravens...', color: '#34d399' },
            { text: 'Warming up the forge...', color: '#f59e0b' },
            { text: 'Assembling the war band...', color: '#fb7185' },
            { text: 'Verifying AES-128 cipher...', color: '#38bdf8' },
        ];

        let isFirstLogin = false;

        let whisperInterval = null;
        let whisperIndex = 0;
        const activeWhispers = [];

        function spawnWhisper() {
            const layer = document.getElementById('whisper-layer');
            if (!layer) return;

            const msg = whisperMessages[whisperIndex % whisperMessages.length];
            whisperIndex++;

            const el = document.createElement('span');
            el.className = 'whisper';
            el.textContent = msg.text;
            el.style.color = msg.color;

            // Random position around the viewport, avoiding the center card area
            const side = Math.random();
            let x, y;
            if (side < 0.25) {
                // left
                x = 4 + Math.random() * 18;
                y = 10 + Math.random() * 80;
            } else if (side < 0.5) {
                // right
                x = 78 + Math.random() * 18;
                y = 10 + Math.random() * 80;
            } else if (side < 0.75) {
                // top
                x = 10 + Math.random() * 80;
                y = 2 + Math.random() * 18;
            } else {
                // bottom
                x = 10 + Math.random() * 80;
                y = 82 + Math.random() * 14;
            }

            el.style.left = x + 'vw';
            el.style.top = y + 'vh';

            layer.appendChild(el);
            activeWhispers.push(el);

            // Fade in
            requestAnimationFrame(() => { el.classList.add('visible'); });

            // Fade out and remove after a few seconds
            setTimeout(() => {
                el.classList.remove('visible');
                el.classList.add('fading');
                setTimeout(() => { el.remove(); }, 700);
                const idx = activeWhispers.indexOf(el);
                if (idx > -1) activeWhispers.splice(idx, 1);
            }, 3600 + Math.random() * 1800);
        }

        function startWhispers() {
            if (whisperInterval) return;
            whisperIndex = Math.floor(Math.random() * whisperMessages.length);
            spawnWhisper();
            whisperInterval = setInterval(spawnWhisper, 1600 + Math.random() * 800);
        }

        function stopWhispers() {
            if (whisperInterval) {
                clearInterval(whisperInterval);
                whisperInterval = null;
            }
            activeWhispers.forEach(el => {
                el.classList.remove('visible');
                el.classList.add('fading');
                setTimeout(() => el.remove(), 700);
            });
            activeWhispers.length = 0;
        }

        // ====================================================================
        // Auth status check
        // ====================================================================
        (async function() {
            try {
                const resp = await fetch('/api/auth/status');
                const data = await resp.json();
                if (!data.configured) {
                    window.location.href = '/';
                    return;
                }
                if (data.authenticated) {
                    window.location.href = '/';
                    return;
                }
                if (!data.hw_match) {
                    document.getElementById('hw-mismatch-warning').classList.remove('hidden');
                }
                if (data.first_login) {
                    isFirstLogin = true;
                }
            } catch (e) {
                console.error('Failed to check auth status:', e);
            }
        })();

        // ====================================================================
        // Helpers
        // ====================================================================
        function showStatus(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.classList.remove('hidden', 'bg-green-900/30', 'border-green-700', 'text-green-300',
                               'bg-red-900/30', 'border-red-700', 'text-red-300',
                               'bg-yellow-900/30', 'border-yellow-700', 'text-yellow-300');
            if (type === 'success') {
                el.className = 'mb-4 p-3 rounded-lg text-sm bg-green-900/30 border border-green-700 text-green-300';
            } else if (type === 'error') {
                el.className = 'mb-4 p-3 rounded-lg text-sm bg-red-900/30 border border-red-700 text-red-300';
            } else {
                el.className = 'mb-4 p-3 rounded-lg text-sm bg-yellow-900/30 border border-yellow-700 text-yellow-300';
            }
            el.textContent = message;
        }

        // ====================================================================
        // Login
        // ====================================================================
        async function handleLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            // Start floating whispers while we wait
            startWhispers();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await resp.json();

                if (data.success) {
                    stopWhispers();
                    showStatus('login-status', 'Authenticated! Loading dashboard...', 'success');
                    // Redirect immediately - dashboard handles DB readiness
                    window.location.href = '/';
                    return;
                } else {
                    stopWhispers();
                    showStatus('login-status', data.error || 'Login failed', 'error');
                    if (data.hw_mismatch) {
                        document.getElementById('hw-mismatch-warning').classList.remove('hidden');
                    }
                    btn.disabled = false;
                    btn.textContent = 'Login';
                }
            } catch (e) {
                if (isFirstLogin) {
                    // Server likely restarted after encryption — wait for it to come back
                    waitForServerAndShowRefresh();
                } else {
                    stopWhispers();
                    showStatus('login-status', 'Connection error. Is Ragnar running?', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Login';
                }
            }
        }

        function waitForServerAndShowRefresh() {
            // Keep whispers running while polling
            const poll = setInterval(async () => {
                try {
                    const resp = await fetch('/api/auth/status', { cache: 'no-store' });
                    if (resp.ok) {
                        clearInterval(poll);
                        showRefreshPrompt();
                    }
                } catch (_) { /* server still down, keep waiting */ }
            }, 2000);
        }

        function showRefreshPrompt() {
            stopWhispers();

            // Clear all whispers and show a single big F5
            const layer = document.getElementById('whisper-layer');
            layer.innerHTML = '';

            const f5 = document.createElement('div');
            f5.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5;';
            f5.innerHTML = '<span style="font-size:8rem;font-weight:900;font-family:monospace;color:rgba(56,189,248,0.12);user-select:none;">F5</span>';
            layer.appendChild(f5);

            // Update the button
            const btn = document.getElementById('login-btn');
            btn.disabled = false;
            btn.textContent = 'Refresh web';
            btn.onclick = function(e) { e.preventDefault(); location.reload(); };

            // Hide the login form fields, show a status message
            document.getElementById('login-form').querySelectorAll('div, label').forEach(el => el.style.display = 'none');
            showStatus('login-status', 'Ragnar is ready. Refresh to continue.', 'success');
        }

        // ====================================================================
        // Recovery
        // ====================================================================
        async function handleRecovery(event) {
            event.preventDefault();

            const newPw = document.getElementById('recovery-new-password').value;
            const confirmPw = document.getElementById('recovery-confirm-password').value;

            if (newPw !== confirmPw) {
                showStatus('recovery-status', 'Passwords do not match', 'error');
                return;
            }

            const btn = document.getElementById('recovery-btn');
            btn.disabled = true;
            btn.textContent = 'Recovering...';

            startWhispers();

            try {
                const resp = await fetch('/api/auth/recover', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('recovery-username').value,
                        recovery_code: document.getElementById('recovery-code').value,
                        new_password: newPw
                    })
                });
                const data = await resp.json();

                if (data.success) {
                    stopWhispers();
                    showStatus('recovery-status', data.message + ' Redirecting...', 'success');
                    setTimeout(() => { window.location.href = '/'; }, 1500);
                } else {
                    stopWhispers();
                    showStatus('recovery-status', data.error || 'Recovery failed', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                }
            } catch (e) {
                stopWhispers();
                showStatus('recovery-status', 'Connection error', 'error');
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        }

        function toggleRecovery() {
            const loginCard = document.getElementById('login-card');
            const recoveryCard = document.getElementById('recovery-card');
            loginCard.classList.toggle('hidden');
            recoveryCard.classList.toggle('hidden');
        }

        function formatRecoveryCode(input) {
            let val = input.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
            if (val.length > 4) {
                val = val.substring(0, 4) + '-' + val.substring(4, 8);
            }
            input.value = val;
        }
    </script>
</body>
</html>
